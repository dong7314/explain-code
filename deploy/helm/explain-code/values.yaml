global:
  env: production
  publicHost: ""
  publicUrl: ""

frontend:
  enabled: true
  replicaCount: 1
  image:
    repository: docker.io/dy7314/explain-code-frontend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  containerPort: 80
  config:
    apiBaseUrl: /api
    authTokenStorageKey: explain-code-auth-token
    authStateStorageKey: explain-code-logged-in
  resources: {}

backend:
  enabled: true
  replicaCount: 1
  image:
    repository: docker.io/dy7314/explain-code-backend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8080
  containerPort: 4000
  config:
    NODE_ENV: production
    PORT: "4000"
    CORS_ORIGIN: ""
    PGHOST: ""
    PGPORT: "5432"
    PGDATABASE: explain_code
    PGUSER: explain_code
    SEED_ADMIN_USERNAME: admin
  secret:
    DATABASE_URL: ""
    JWT_SECRET: change-this-jwt-secret
    TOKEN_PEPPER: change-this-token-pepper
    PGPASSWORD: ""
    SEED_ADMIN_PASSWORD: change-this-admin-password
  resources: {}

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  auth:
    database: explain_code
    username: explain_code
    password: change-this-postgres-password
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: ""
  resources: {}

migration:
  enabled: true
  seed: false
  backoffLimit: 5

ingress:
  enabled: true
  className: ""
  annotations: {}
  host: explain-code.local
  paths:
    - path: /api
      pathType: Prefix
      service: backend
    - path: /
      pathType: Prefix
      service: frontend
  tls:
    enabled: false
    secretName: explain-code-tls
    hosts: []
