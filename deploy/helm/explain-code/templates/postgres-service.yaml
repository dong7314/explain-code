{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "explain-code.postgresName" . }}
  labels:
    {{- include "explain-code.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "explain-code.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
