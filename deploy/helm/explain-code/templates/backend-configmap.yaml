{{- if .Values.backend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "explain-code.fullname" . }}-backend-config
  labels:
    {{- include "explain-code.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  {{- range $key, $value := .Values.backend.config }}
  {{- if and (eq $key "CORS_ORIGIN") (not $value) (include "explain-code.publicUrl" $) }}
  {{ $key }}: {{ include "explain-code.publicUrl" $ | quote }}
  {{- else }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
